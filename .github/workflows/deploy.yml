name: Deploy RepCore

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject sync token & deploy to gh-pages
        env:
          SYNC_TOKEN: ${{ secrets.REPCORE_SYNC_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Replace placeholder with actual token in a copy
          cp index.html index_deploy.html
          sed -i "s|%%ST%%|${SYNC_TOKEN}|g" index_deploy.html
          mv index_deploy.html index.html

          # Bump SW version to force cache refresh
          sed -i "s|repcore-v[0-9]*|repcore-v$(date +%s)|g" sw.js

          # Configure git
          git config user.name "repcore-bot"
          git config user.email "bot@repcore"

          # Create orphan gh-pages branch with just the built files
          git add -A
          git stash

          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-new

          # Restore all files
          git stash pop

          # Replace placeholder in working tree
          sed -i "s|%%ST%%|${SYNC_TOKEN}|g" index.html
          sed -i "s|repcore-v[0-9]*|repcore-v$(date +%s)|g" sw.js

          git add -A
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M')"
          git push origin gh-pages-new:gh-pages --force
          echo "✅ Deployed to gh-pages"
